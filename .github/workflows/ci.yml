name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Format check
        run: |
          python -m black --check src tests
          python -m isort --check-only src tests
      - name: Type check
        run: python -m mypy src
      - name: Unit tests
        run: python -m pytest -m "not integration"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit cyclonedx-bom
      - name: Dependency audit
        run: python -m pip_audit -r requirements.lock.txt --require-hashes
      - name: Generate SBOM
        run: cyclonedx-py requirements requirements.lock.txt --pyproject pyproject.toml --output-file sbom.json --output-reproducible
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json